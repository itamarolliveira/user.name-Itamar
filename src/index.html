<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Classic</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="game">
      <section class="hud">
        <div>Score: <strong data-score>0</strong></div>
        <div>Status: <strong data-status>Running</strong></div>
      </section>

      <section class="board" data-board data-state="running" aria-label="Snake board"></section>

      <section class="controls" aria-label="Direction controls">
        <span></span>
        <button data-direction="up" aria-label="Move up">Up</button>
        <span></span>
        <button data-direction="left" aria-label="Move left">Left</button>
        <span></span>
        <button data-direction="right" aria-label="Move right">Right</button>
        <span></span>
        <button data-direction="down" aria-label="Move down">Down</button>
        <span></span>
      </section>

      <section class="actions">
        <button data-action="pause">Pause</button>
        <button data-action="restart">Restart</button>
      </section>

      <p class="note">Keyboard: Arrow keys or WASD. Space = pause/resume. R = restart.</p>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
